syntax = "proto3";

option go_package = ".;pb";

service Greeter {
  rpc SayHello (HelloRequest) returns (HelloReply) {}
  rpc StreamNumbers (NumberRequest) returns (stream NumberReply) {}
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}

message NumberRequest {
  int32 max = 1;
}

message NumberReply {
  int32 number = 1;
}