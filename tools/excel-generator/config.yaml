---
template_path: ./templates/（2025HD10地块-@file_num田块）田块土方开挖单元工程施工质量验收评定表.xlsx
output_dir: ./output
file_count: 2
file_num_pattern: "@file_num"
sheet_pool_size: 2

templates:
#表土剥离与回覆
  - pattern: "@int<30,33>.cell" #>=30，规则匹配@int<30,33>.cell
    type: int #int类型
    min: 30 #最小值
    max: 33 #最大值
  - pattern: "@int<90,93>.cell" #>=90
    type: int
    min: 90
    max: 30
  - pattern: "@int<83,90>.cell" #>=85
    type: int
    min: 83
    max: 90
  - pattern: "@int<7,12>.cell" #<=10
    type: int
    min: 7
    max: 12
#  表土及土质岸坡清理工序
  - pattern: "@float.2<25,26>" #规则匹配@float.2<25,26>
    type: float #float类型
    min: 25 #最小值
    max: 26 #最大值
    decimal: 2 #小数位数
  - pattern: "@float.2<15,16>" #>=15
    type: float
    min: 15
    max: 16
    decimal: 2
  - pattern: "@float.1<2.0,2.5>" #>=2
    type: float
    min: 2
    max: 2.5
    decimal: 1
#软基或土质岸坡开挖工序
  - pattern: "@float.2<50,50.3>" #>=50
    type: float
    min: 50
    max: 50.3
    decimal: 2
  - pattern: "@float.2<20,20.3>" #>=20
    type: float
    min: 20
    max: 20.3
    decimal: 2
  - pattern: "@float.2<55.3,55.5>" #>=55.3
    type: float
    min: 55.3
    max:  55.5
    decimal: 2
  - pattern: "@int<7,15>" #<=15
    type: int
    min: 7
    max: 15
#土料填筑卸料及铺填工序
  - pattern: "@int<28,30>" #<=30
    type: int
    min: 28
    max: 30
#土料填筑土料压实工序
  - pattern: "@float.1<98,98.5>" #>=98
    type: float
    min: 98
    max:  98.5
    decimal: 1
  - pattern: "@float.1<1,3>" #<=3
    type: float
    min: 0
    max:  3
    decimal: 1
  - pattern: "@float.1<1,1.5>"
    type: float
    min: 1
    max:  1.5
    decimal: 1
  - pattern: "@float.1<0.3,0.4>"
    type: float
    min: 0.3
    max:  0.4
    decimal: 1 
#土料填筑接缝处理工序
  - pattern: "@float.2<0.96,0.98>"
    type: float
    min: 0.96
    max:  0.98
    decimal: 2
#田埂修筑质量评定表				
  - pattern: "@int<-30,30>.cell" #田埂断面尺寸，±30	
    type: int #int类型
    min: -30 #最小值
    max: 30 #最大值
  - pattern: "@int<-80,80>.cell"
    type: int
    min: -80
    max: 80
  - pattern: "@int<-50,50>.cell"
    type: int
    min: -50
    max: 50
 #田块平整单元工程
  - pattern: "@int<3,8>.cell"
    type: int
    min: 3
    max: 8
#预制件吊装工序
  
  - pattern: "@int<-10,10>"
    type: int
    min: -10
    max: 10
  - pattern: "@int<-10,10>.cell"
    type: int
    min: -10
    max: 10
  - pattern: "@float.3<8.4,8.6>"
    type: float
    min: 8.4
    max: 8.6
    decimal: 3
  - pattern: "@float.3<15,15.01>"
    type: float
    min: 15
    max: 15.01
    decimal: 3
  - pattern: "@float.3<1.0,1.01>"
    type: float
    min: 1
    max: 1.01
    decimal: 3
  - pattern: "@float.3<1.2,1.21>"
    type: float
    min: 1.2
    max: 11.21
    decimal: 3
  - pattern: "@float.3<61.7,61.71>"
    type: float
    min: 61.7
    max: 61.71
    decimal: 3
  - pattern: "@float.3<11.3,11.31>"
    type: float
    min: 11.3
    max: 11.31
    decimal: 3
  - pattern: "@float.3<0.2,1.7>"
    type: float
    min: 0.2
    max: 1.7
    decimal: 1
  - pattern: "@float.3<0.3,3.1>"
    type: float
    min: 0.3
    max: 3.1
    decimal: 1
  - pattern: "@float.3<16.98,17.03>"
    type: float
    min: 16.98
    max: 17.03
    decimal: 2
  - pattern: "@float.3<29.98,30.03>"
    type: float
    min: 29.98
    max: 30.03
    decimal: 2
